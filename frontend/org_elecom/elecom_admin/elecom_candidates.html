<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidates - ELECOM</title>
    <link rel="icon" href="/static/assets/elecom.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/org_elecom/elecom_admin/admin_components/admin_css/admin_dashboard.css">
    <link rel="stylesheet" href="/static/org_elecom/elecom_admin/admin_components/admin_css/elecom_candidates.css">
</head>
<body class="theme-elecom">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-content">
                <div class="logo-container">
                    <img class="sidebar-logo" src="/static/assets/elecom.png" alt="ELECOM Logo" onerror="this.onerror=null;this.src='/static/assets/elecom.png';">
                    <img class="wordmark" src="/static/assets/img_text/elecom_white1.png" alt="Electoral Commission">
                </div>

                <button class="btn-close-sidebar" id="closeSidebar"><i class="bi bi-x-lg"></i></button>
            </div>
        </div>
        <div class="sidebar-menu">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/admin_dashboard.html"><i class="bi bi-house-door"></i><span>Home</span></a></li>
                <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_register_candidate.html"><i class="bi bi-person-plus"></i><span>Register Candidate</span></a></li>
                <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_election_date.html"><i class="bi bi-calendar-event"></i><span>Set Election Dates</span></a></li>
                <li class="nav-item"><a class="nav-link active" href="/static/org_elecom/elecom_admin/elecom_candidates.html"><i class="bi bi-people"></i><span>Candidates</span></a></li>
                <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_results.html"><i class="bi bi-graph-up"></i><span>Results</span></a></li>
                <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_reset.html"><i class="bi bi-arrow-counterclockwise"></i><span>Reset Votes</span></a></li>
                <li class="nav-item">
                    <a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_reports.html">
                        <i class="bi bi-file-earmark-bar-graph"></i>
                        <span>Generate Reports</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <nav class="top-navbar d-flex align-items-center gap-3">
            <button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>
            <div class="search-box search-container search-pill position-relative" style="min-width:320px; flex:1 1 auto; max-width: 760px;">
                <div class="input-group input-group-lg search-input-group">
                    <input id="listSearch" type="text" class="form-control" placeholder="Search name, ID, party, position..." autocomplete="off">
                    <button class="btn btn-outline-secondary search-btn" type="button" id="listSearchBtn"><i class="bi bi-search"></i></button>
                </div>
            </div>
            <div id="userMenuMount"></div>
        </nav>

        <div class="content-area">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <div class="d-flex align-items-center gap-3">
                            <h5 class="mb-0">Candidates</h5>
                            <div class="form-check m-0">
                                <input class="form-check-input" type="checkbox" id="selectAll">
                                <label class="form-check-label" for="selectAll">Select all</label>
                            </div>
                            <button class="btn btn-outline-danger btn-sm" id="bulkDeleteBtn" disabled>
                                <i class="bi bi-person-dash"></i> Unregister Selected
                            </button>
                        </div>
                        <div class="text-muted small" id="listCount"></div>
                    </div>
                    <div id="candidatesList" class="vstack gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Candidate</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="editForm" class="row g-3">
              <input type="hidden" name="id" id="ed_id">
              <div class="col-md-4">
                <label class="form-label">First name</label>
                <input type="text" class="form-control" name="first_name" id="ed_first_name" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Middle name</label>
                <input type="text" class="form-control" name="middle_name" id="ed_middle_name">
              </div>
              <div class="col-md-4">
                <label class="form-label">Last name</label>
                <input type="text" class="form-control" name="last_name" id="ed_last_name" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Organization</label>
                <input type="text" class="form-control" name="organization" id="ed_org" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Position</label>
                <input type="text" class="form-control" name="position" id="ed_position" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Program</label>
                <input type="text" class="form-control" name="program" id="ed_program" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Year/Section</label>
                <input type="text" class="form-control" name="year_section" id="ed_year" required>
              </div>
              <div class="col-md-8">
                <label class="form-label">Platform</label>
                <textarea class="form-control" rows="3" name="platform" id="ed_platform"></textarea>
              </div>
              <div class="col-md-6">
                <label class="form-label">Photo URL</label>
                <input type="url" class="form-control" name="photo_url" id="ed_photo_url">
              </div>
              <div class="col-md-6">
                <label class="form-label">Party Logo URL</label>
                <input type="url" class="form-control" name="party_logo_url" id="ed_party_logo_url">
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-primary" id="saveEditBtn">Save changes</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Unregister Candidate</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="mb-0">Are you sure you want to unregister <strong id="delName"></strong>?</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Unregister</button>
          </div>
        </div>
      </div>
    </div>

    <!-- View Details Modal (body root) -->
    <div class="modal fade" id="viewModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Candidate Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="d-flex gap-3 align-items-start">
                <img id="vd_photo" src="" alt="" class="rounded border vd-photo">
                <div class="flex-grow-1">
                    <div class="h5 mb-1" id="vd_name"></div>
                    <div class="text-muted small">Student ID: <span id="vd_student_id"></span></div>
                    <div class="mt-2 row g-2">
                        <div class="col-md-6"><strong>Organization:</strong> <span id="vd_org"></span></div>
                        <div class="col-md-6"><strong>Position:</strong> <span id="vd_position"></span></div>
                        <div class="col-md-6"><strong>Program:</strong> <span id="vd_program"></span></div>
                        <div class="col-md-6"><strong>Year/Section:</strong> <span id="vd_year"></span></div>
                        <div class="col-md-12 d-flex align-items-center gap-2"><strong>Party:</strong> <img id="vd_party_logo" src="" alt="" class="rounded-circle border vd-party-logo"> <span id="vd_party"></span></div>
                    </div>
                </div>
            </div>
            <hr>
            <div>
                <strong>Platform</strong>
                <div id="vd_platform" class="mt-1 vd-platform"></div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/org_elecom/elecom_admin/admin_components/admin_js/admin_user_menu.js?v=20260313"></script>
    <script src="/static/org_elecom/elecom_admin/admin_components/admin_js/elecom_candidates.js"></script>
</body>
</html>
