<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results - ELECOM</title>
  <link rel="icon" href="/static/assets/logo/elecom_2.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/org_elecom/elecom_admin/admin_components/admin_css/admin_dashboard.css">
  <link rel="stylesheet" href="/static/org_elecom/elecom_admin/admin_components/admin_css/elecom_results.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="theme-elecom">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-content">
        <div class="logo-container">
          <img class="sidebar-logo" src="/static/assets/elecom.png" alt="ELECOM Logo" onerror="this.onerror=null;this.src='/static/assets/elecom.png';">
          <img class="wordmark" src="/static/assets/img_text/elecom_white1.png" alt="Electoral Commission">
        </div>
        <button class="btn-close-sidebar" id="closeSidebar"><i class="bi bi-x-lg"></i></button>
      </div>
    </div>
    <div class="sidebar-menu">
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/admin_dashboard.html"><i class="bi bi-house-door"></i><span>Home</span></a></li>
        <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_register_candidate.html"><i class="bi bi-person-plus"></i><span>Register Candidate</span></a></li>
        <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_election_date.html"><i class="bi bi-calendar-event"></i><span>Set Election Dates</span></a></li>
        <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_candidates.html"><i class="bi bi-people"></i><span>Candidates</span></a></li>
        <li class="nav-item"><a class="nav-link active" href="/static/org_elecom/elecom_admin/elecom_results.html"><i class="bi bi-graph-up"></i><span>Results</span></a></li>
        <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_reset.html"><i class="bi bi-arrow-counterclockwise"></i><span>Reset Votes</span></a></li>
        <li class="nav-item">
                    <a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_reports.html">
                        <i class="bi bi-file-earmark-bar-graph"></i>
                        <span>Generate Reports</span>
                    </a>
                </li>
        <li class="nav-item"><a class="nav-link" href="#" id="logoutLink"><i class="bi bi-speedometer2"></i><span>Logout</span></a></li>
      </ul>
    </div>
  </div>

  <div class="main-content">
    <nav class="top-navbar d-flex align-items-center gap-3">
      <button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>
      <div class="user-info">
        <div class="user-avatar"><i class="bi bi-person-gear"></i></div>
        <div class="user-details">
          <div class="user-name" id="displayName">Admin</div>
          <div class="user-role" id="displayRole">admin</div>
        </div>
      </div>
    </nav>

    <div class="content-area">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h3 class="mb-4 text-center">Election Results</h3>

          <div class="row g-3 mb-4">
            <div class="col-12 col-lg-6">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                  <h6 class="text-muted mb-3">Overall Vote Distribution</h6>
                  <div class="chart-box"><canvas id="orgPie"></canvas></div>
                </div>
              </div>
            </div>
            <div class="col-12 col-lg-6">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                  <h6 class="text-muted mb-3">Votes by Position</h6>
                  <div class="chart-box"><canvas id="posBar"></canvas></div>
                </div>
              </div>
            </div>
          </div>

          <div class="text-muted" id="resultsEmpty">No candidates or votes data.</div>
          <div id="resultsContainer"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/org_elecom/elecom_admin/admin_components/admin_js/elecom_results.js"></script>
</body>
</html>
