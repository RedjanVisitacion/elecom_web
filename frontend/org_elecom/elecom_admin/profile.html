<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ELECOM</title>
    <link rel="icon" href="/static/assets/elecom.png" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/org_elecom/elecom_admin/admin_components/admin_css/admin_dashboard.css?v=20260313">
</head>
<body class="theme-elecom">

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-content">
                <div class="logo-container">
                    <img src="/static/assets/elecom.png" alt="ELECOM Logo" onerror="this.onerror=null;this.src='/static/assets/elecom.png';">
                    <img class="wordmark" src="/static/assets/img_text/elecom_white1.png" alt="Electoral Commission">
                </div>
                <button class="btn-close-sidebar" id="closeSidebar"><i class="bi bi-x-lg"></i></button>
            </div>
        </div>
        <div class="sidebar-menu">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="/static/org_elecom/elecom_admin/admin_dashboard.html">
                        <i class="bi bi-house-door"></i>
                        <span>Home</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_register_candidate.html">
                        <i class="bi bi-person-plus"></i>
                        <span>Register Candidate</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_election_date.html">
                        <i class="bi bi-calendar-event"></i>
                        <span>Set Election Dates</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_candidates.html">
                        <i class="bi bi-people"></i>
                        <span>Candidates</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_results.html">
                        <i class="bi bi-graph-up"></i>
                        <span>Results</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_reset.html">
                        <i class="bi bi-arrow-counterclockwise"></i>
                        <span>Reset Votes</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_reports.html">
                        <i class="bi bi-file-earmark-bar-graph"></i>
                        <span>Generate Reports</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <nav class="top-navbar">
            <button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>

            <div class="search-box" style="min-width:320px; flex:1 1 auto; max-width: 760px; visibility:hidden;">
                <div class="input-group input-group-lg">
                    <input type="text" class="form-control" placeholder="" disabled>
                </div>
            </div>
            <div id="userMenuMount"></div>
        </nav>

        <div class="content-area">
            <div class="profile-fb-header mb-3">
                <div class="profile-fb-cover"></div>
                <div class="profile-fb-body">
                    <div class="profile-fb-identity">
                        <div class="profile-fb-avatar">
                            <img id="profileAvatarImg" src="" alt="" style="display:none;">
                            <i id="profileAvatarIcon" class="bi bi-person-circle" style="font-size:72px; color:#6b7280;"></i>
                        </div>

                        <div class="profile-fb-title">
                            <div class="fw-semibold fs-4" id="profileHeaderName">Profile</div>
                            <div class="text-muted" id="profileSubtitle">Account information</div>
                        </div>
                    </div>

                    <div class="profile-fb-actions">
                        <input id="profilePhotoFile" type="file" accept="image/*" style="display:none;">
                        <button type="button" class="btn btn-light border" id="btnChangeProfilePhoto">
                            <i class="bi bi-camera me-2"></i>Change photo
                        </button>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="alert alert-success" id="profileSuccess" style="display:none;"></div>

                    <div class="alert alert-danger" id="profileError" style="display:none;"></div>

                    <div class="row g-3" id="profileGrid" style="display:none;">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_full_name" readonly>
                                <label for="pf_full_name">Full Name</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_student_id" readonly>
                                <label for="pf_student_id">Student ID</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_course" readonly>
                                <label for="pf_course">Course</label>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_year" readonly>
                                <label for="pf_year">Year</label>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_section" readonly>
                                <label for="pf_section">Section</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_email" readonly>
                                <label for="pf_email">Email</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_phone" readonly>
                                <label for="pf_phone">Phone</label>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_role" readonly>
                                <label for="pf_role">Role</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_created_at" readonly>
                                <label for="pf_created_at">Created At</label>
                            </div>
                        </div>
                    </div>

                    <div class="text-muted" id="profileLoading">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="/static/org_elecom/elecom_admin/admin_components/admin_js/admin_user_menu.js?v=20260313"></script>
    <script src="/static/org_elecom/elecom_admin/admin_components/admin_js/profile.js?v=20260313"></script>
</body>
</html>
