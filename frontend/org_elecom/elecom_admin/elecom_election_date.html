<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Election Dates - ELECOM</title>
    <link rel="icon" href="/static/assets/elecom.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/org_elecom/elecom_admin/admin_components/admin_css/admin_dashboard.css">
    <link rel="stylesheet" href="/static/org_elecom/elecom_admin/admin_components/admin_css/elecom_election_date.css">
</head>
<body class="theme-elecom">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-content">
                <div class="logo-container">
                    <img class="sidebar-logo" src="/static/assets/elecom.png" alt="ELECOM Logo" onerror="this.onerror=null;this.src='/static/assets/elecom.png';">
                    <img class="wordmark" src="/static/assets/img_text/elecom_white1.png" alt="Electoral Commission">
                </div>
                <button class="btn-close-sidebar" id="closeSidebar">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>
        <div class="sidebar-menu">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/admin_dashboard.html"><i class="bi bi-house-door"></i><span>Home</span></a></li>
                <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_register_candidate.html"><i class="bi bi-person-plus"></i><span>Register Candidate</span></a></li>
                <li class="nav-item"><a class="nav-link active" href="/static/org_elecom/elecom_admin/elecom_election_date.html"><i class="bi bi-calendar-event"></i><span>Set Election Dates</span></a></li>
                <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_candidates.html"><i class="bi bi-people"></i><span>Candidates</span></a></li>
                <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_results.html"><i class="bi bi-graph-up"></i><span>Results</span></a></li>
                <li class="nav-item"><a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_reset.html"><i class="bi bi-arrow-counterclockwise"></i><span>Reset Votes</span></a></li>
                <li class="nav-item">
                    <a class="nav-link" href="/static/org_elecom/elecom_admin/elecom_reports.html">
                        <i class="bi bi-file-earmark-bar-graph"></i>
                        <span>Generate Reports</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <nav class="top-navbar d-flex align-items-center gap-3">
            <button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>
            <div id="userMenuMount"></div>
        </nav>

        <!-- Candidate Detail Modal -->
        <div class="modal fade" id="candidateModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <div class="d-flex align-items-center gap-2">
                            <img id="cd_photo" src="" alt="Profile" class="rounded-circle border" style="width:42px;height:42px;object-fit:cover;display:none;">
                            <h5 class="modal-title mb-0">Candidate Details</h5>
                        </div>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="cd_name" readonly>
                                    <label for="cd_name">Name</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="cd_student_id" readonly>
                                    <label for="cd_student_id">Student ID</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="cd_position" readonly>
                                    <label for="cd_position">Position</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="cd_org" readonly>
                                    <label for="cd_org">Organization</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="cd_program" readonly>
                                    <label for="cd_program">Program</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="cd_year" readonly>
                                    <label for="cd_year">Year/Section</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Platform</label>
                                <div class="p-2 border rounded" id="cd_platform" style="min-height:64px;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="content-area">
            <div class="alert alert-success" id="successAlert" role="alert" style="display:none;"></div>
            <div class="alert alert-danger" id="errorAlert" role="alert" style="display:none;"></div>

            <form method="post" class="card p-4 border-0 election-window-card" id="electionWindowForm">
                <h5 class="mb-3 fw-bold"><i class="bi bi-calendar3 me-2"></i>Election Window</h5>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-medium"><i class="bi bi-calendar-event me-2"></i>Start Date & Time</label>
                        <input type="datetime-local" name="start_at" id="startAt" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-medium"><i class="bi bi-calendar2-event me-2"></i>End Date & Time</label>
                        <input type="datetime-local" name="end_at" id="endAt" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-medium"><i class="bi bi-calendar-check me-2"></i>Results Date & Time</label>
                        <input type="datetime-local" name="results_at" id="resultsAt" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-medium"><i class="bi bi-card-text me-2"></i>Note (optional)</label>
                        <input type="text" name="note" id="note" class="form-control" placeholder="Vote wisely">
                    </div>
                </div>

                <div class="mt-4 p-3 border rounded confirmation-box">
                    <h6 class="mb-3 fw-semibold"><i class="bi bi-shield-lock me-2"></i>Confirmation</h6>
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label fw-medium"><i class="bi bi-lock-fill me-2"></i>Admin Password</label>
                            <input type="password" name="admin_password" id="adminPassword" class="form-control" required>
                        </div>
                        <div class="col-md-8 text-end">
                            <button type="submit" class="btn btn-primary btn-lg btn-save-dates">
                                <i class="bi bi-check2-circle me-2"></i>Save Dates
                            </button>
                            <div id="saveStatusInline" class="small mt-2" style="display:none;"></div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/org_elecom/elecom_admin/admin_components/admin_js/admin_user_menu.js?v=20260313"></script>
    <script src="/static/org_elecom/elecom_admin/admin_components/admin_js/elecom_election_date.js?v=20260313"></script>
</body>
</html>
