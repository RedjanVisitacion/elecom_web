<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Enrollment - ELECOM</title>
    <link rel="icon" type="image/png" href="/static/assets/elecom.png?v=3">
    <link rel="shortcut icon" type="image/png" href="/static/assets/elecom.png?v=3">
    <link rel="apple-touch-icon" href="/static/assets/elecom.png?v=3">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/org_elecom/elecom_user/user_components/user_css/user_dashboard.css?v=20260610-face-label-visible">
</head>
<body class="theme-elecom face-enrollment-body">
    <main class="face-enroll-shell">
        <section class="face-enroll-panel" aria-labelledby="faceEnrollTitle">
            <div class="face-enroll-top">
                <div class="face-enroll-brand">
                    <img src="/static/assets/elecom.png" alt="ELECOM Logo">
                    <div>
                        <span>Student Account Setup</span>
                        <h1 id="faceEnrollTitle">Register Your Face</h1>
                    </div>
                </div>
                <button type="button" class="btn btn-outline-danger face-enroll-logout" id="faceLogoutBtn">
                    <i class="bi bi-box-arrow-right"></i>
                    Logout
                </button>
            </div>

            <p class="face-enroll-copy">
                Face enrollment is required before opening the student dashboard and voting tools.
            </p>

            <div class="face-camera-card">
                <video id="faceVideo" class="face-camera-video" autoplay playsinline muted></video>
                <canvas id="faceCanvas" class="face-camera-canvas" width="720" height="540" hidden></canvas>
                <canvas id="faceAnalysisCanvas" width="240" height="180" hidden></canvas>
                <div class="face-guide-overlay" aria-hidden="true">
                    <div class="face-guide-frame" id="faceGuideFrame" data-state="searching">
                        <span class="face-guide-corner face-guide-corner--tl"></span>
                        <span class="face-guide-corner face-guide-corner--tr"></span>
                        <span class="face-guide-corner face-guide-corner--bl"></span>
                        <span class="face-guide-corner face-guide-corner--br"></span>
                        <span class="face-guide-label">Center your face</span>
                    </div>
                </div>
                <div class="face-camera-placeholder" id="facePlaceholder">
                    <i class="bi bi-camera-video"></i>
                    <span>Allow camera access to begin enrollment.</span>
                </div>
            </div>

            <div class="face-liveness-steps" aria-label="Face enrollment checks">
                <div class="face-liveness-step" id="faceStepPosition" data-state="active">
                    <i class="bi bi-person-bounding-box"></i>
                    <span>Center your face</span>
                </div>
                <div class="face-liveness-step" id="faceStepBlink">
                    <i class="bi bi-eye"></i>
                    <span>Blink once</span>
                </div>
                <div class="face-liveness-step" id="faceStepCapture">
                    <i class="bi bi-camera"></i>
                    <span>Capturing...</span>
                </div>
            </div>

            <div class="face-enroll-status" id="faceEnrollStatus" role="status">
                Center your face.
            </div>
        </section>
    </main>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14';

        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('faceVideo');
            const canvas = document.getElementById('faceCanvas');
            const analysisCanvas = document.getElementById('faceAnalysisCanvas');
            const placeholder = document.getElementById('facePlaceholder');
            const statusEl = document.getElementById('faceEnrollStatus');
            const logoutBtn = document.getElementById('faceLogoutBtn');
            const guideFrame = document.getElementById('faceGuideFrame');
            const guideLabel = guideFrame ? guideFrame.querySelector('.face-guide-label') : null;
            const stepPosition = document.getElementById('faceStepPosition');
            const stepBlink = document.getElementById('faceStepBlink');
            const stepCapture = document.getElementById('faceStepCapture');
            const params = new URLSearchParams(window.location.search);
            const next = params.get('next') || '/static/org_elecom/elecom_user/user_dashboard.html';

            let stream = null;
            let faceLandmarker = null;
            let detectionTimer = null;
            let lastVideoTime = -1;
            let capturedBlob = null;
            let submitting = false;
            let detectorReady = false;
            let currentFaceValid = false;
            let eyesWereOpen = false;
            let blinkClosedSeen = false;
            let blinkDetected = false;
            let captureTimer = null;

            const setStatus = (message, tone) => {
                statusEl.textContent = message;
                statusEl.dataset.tone = tone || '';
                if (guideLabel) {
                    guideLabel.textContent = message;
                    guideLabel.dataset.tone = tone || '';
                }
            };

            const setStep = (el, state) => {
                if (!el) return;
                el.dataset.state = state || '';
            };

            const setFrameState = (state) => {
                if (guideFrame) guideFrame.dataset.state = state;
            };

            const safeNext = () => {
                if (next.startsWith('/static/org_elecom/elecom_user/')) return next;
                return '/static/org_elecom/elecom_user/user_dashboard.html';
            };

            const stopCamera = () => {
                if (detectionTimer) {
                    clearInterval(detectionTimer);
                    detectionTimer = null;
                }
                if (captureTimer) {
                    clearTimeout(captureTimer);
                    captureTimer = null;
                }
                if (!stream) return;
                stream.getTracks().forEach((track) => track.stop());
                stream = null;
            };

            const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

            const landmarkBox = (lm) => {
                let minX = 1;
                let minY = 1;
                let maxX = 0;
                let maxY = 0;
                lm.forEach((p) => {
                    minX = Math.min(minX, p.x);
                    minY = Math.min(minY, p.y);
                    maxX = Math.max(maxX, p.x);
                    maxY = Math.max(maxY, p.y);
                });
                return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
            };

            const eyeAspectRatio = (lm, indices) => {
                const [p1, p2, p3, p4, p5, p6] = indices.map((i) => lm[i]);
                return (dist(p2, p6) + dist(p3, p5)) / Math.max(0.001, 2 * dist(p1, p4));
            };

            const frameWarning = (box) => {
                if (!analysisCanvas || video.readyState < 2) return '';
                const srcW = video.videoWidth || 720;
                const srcH = video.videoHeight || 540;
                const w = 160;
                const h = Math.max(1, Math.round(w * srcH / srcW));
                analysisCanvas.width = w;
                analysisCanvas.height = h;
                const ctx = analysisCanvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(video, 0, 0, w, h);
                const data = ctx.getImageData(0, 0, w, h).data;
                let sum = 0;
                for (let i = 0; i < data.length; i += 4) {
                    sum += 0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2];
                }
                const avg = sum / Math.max(1, data.length / 4);
                const offCenter = Math.hypot((box.x + box.width / 2) - 0.5, (box.y + box.height / 2) - 0.48) > 0.16;
                if (avg < 50) return 'Low lighting, but you can continue.';
                if (offCenter) return 'Face not perfectly centered, but you can continue.';
                return '';
            };

            const analyzeLandmarks = (lm) => {
                const box = landmarkBox(lm);
                const leftEar = eyeAspectRatio(lm, [33, 160, 158, 133, 153, 144]);
                const rightEar = eyeAspectRatio(lm, [362, 385, 387, 263, 373, 380]);
                const avgEar = (leftEar + rightEar) / 2;
                const nose = lm[1];
                const mouthTop = lm[13];
                const mouthBottom = lm[14];
                const mouthLeft = lm[61];
                const mouthRight = lm[291];
                const isInside = (p, margin = 0.02) => p && p.x > margin && p.x < 1 - margin && p.y > margin && p.y < 1 - margin;
                const centerX = box.x + box.width / 2;
                const centerY = box.y + box.height / 2;
                const faceCentered = Math.abs(centerX - 0.5) <= 0.24 && Math.abs(centerY - 0.50) <= 0.28;
                const keyLandmarksVisible = isInside(nose, 0.04) && [mouthTop, mouthBottom, mouthLeft, mouthRight].every((p) => isInside(p, 0.035));
                const faceLargeEnough = box.height >= 0.24;
                const faceNotTooLarge = box.height <= 1.05;
                const eyesVisible = leftEar > 0.07 && rightEar > 0.07;
                return {
                    box,
                    avgEar,
                    eyesOpen: avgEar > 0.21,
                    eyesClosed: avgEar < 0.16,
                    valid: faceCentered && faceLargeEnough && faceNotTooLarge && eyesVisible && keyLandmarksVisible,
                    tooFar: box.height < 0.24,
                    warning: frameWarning(box),
                };
            };

            const resetBlinkIfInvalid = () => {
                currentFaceValid = false;
                eyesWereOpen = false;
                blinkClosedSeen = false;
                blinkDetected = false;
                if (captureTimer) {
                    clearTimeout(captureTimer);
                    captureTimer = null;
                }
            };

            const updateUi = (face) => {
                if (!face) {
                    resetBlinkIfInvalid();
                    setFrameState('searching');
                    setStatus('Center your face', 'error');
                    setStep(stepPosition, 'active');
                    setStep(stepBlink, '');
                    setStep(stepCapture, '');
                    return;
                }

                if (!face.valid) {
                    resetBlinkIfInvalid();
                    setFrameState('searching');
                    setStatus(face.tooFar ? 'Center your face' : 'Center your face', 'error');
                    setStep(stepPosition, 'active');
                    setStep(stepBlink, '');
                    setStep(stepCapture, '');
                    return;
                }

                currentFaceValid = true;
                setStep(stepPosition, 'done');

                if (face.eyesOpen) {
                    eyesWereOpen = true;
                    if (blinkClosedSeen) blinkDetected = true;
                } else if (eyesWereOpen && face.eyesClosed) {
                    blinkClosedSeen = true;
                }

                if (blinkDetected) {
                    setFrameState('done');
                    setStatus('Capturing...', 'success');
                    setStep(stepBlink, 'done');
                    setStep(stepCapture, 'active');
                    if (!captureTimer && !submitting && !capturedBlob) {
                        captureTimer = window.setTimeout(captureFace, 1000);
                    }
                    return;
                }

                setFrameState('ready');
                setStatus(face.warning || 'Blink once');
                setStep(stepBlink, 'active');
                setStep(stepCapture, '');
            };

            const analyzeFace = () => {
                if (!stream || video.hidden || capturedBlob || submitting || !detectorReady || !faceLandmarker || video.readyState < 2) return;
                if (video.currentTime === lastVideoTime) return;
                lastVideoTime = video.currentTime;
                const result = faceLandmarker.detectForVideo(video, performance.now());
                const landmarks = result.faceLandmarks && result.faceLandmarks[0];
                updateUi(landmarks ? analyzeLandmarks(landmarks) : null);
            };

            const startCamera = async () => {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 540 } },
                        audio: false,
                    });
                    video.srcObject = stream;
                    placeholder.hidden = true;
                    setStatus('Center your face');
                    const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
                    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                        baseOptions: {
                            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task',
                            delegate: 'GPU',
                        },
                        runningMode: 'VIDEO',
                        numFaces: 1,
                        minFaceDetectionConfidence: 0.55,
                        minFacePresenceConfidence: 0.55,
                        minTrackingConfidence: 0.55,
                    });
                    detectorReady = true;
                    detectionTimer = setInterval(analyzeFace, 120);
                } catch (error) {
                    setStatus('Camera access is required. Allow camera permission, then reload this page.', 'error');
                    placeholder.hidden = false;
                }
            };

            const captureFace = () => {
                captureTimer = null;
                if (!currentFaceValid || !blinkDetected || submitting) {
                    setStatus('Blink once', 'error');
                    return;
                }
                const width = video.videoWidth || 720;
                const height = video.videoHeight || 540;
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, width, height);
                canvas.toBlob((blob) => {
                    if (!blob) {
                        setStatus('Center your face', 'error');
                        resetBlinkIfInvalid();
                        return;
                    }
                    capturedBlob = blob;
                    canvas.hidden = false;
                    video.hidden = true;
                    setStatus('Capturing...', 'success');
                    submitFace();
                }, 'image/jpeg', 0.92);
            };

            const resetAutoFlow = () => {
                capturedBlob = null;
                resetBlinkIfInvalid();
                canvas.hidden = true;
                video.hidden = false;
                setStatus('Center your face');
                setFrameState('searching');
                setStep(stepPosition, 'active');
                setStep(stepBlink, '');
                setStep(stepCapture, '');
            };

            const submitFace = async () => {
                if (!capturedBlob || submitting) return;
                submitting = true;

                const formData = new FormData();
                formData.append('face_image', capturedBlob, 'face-enrollment.jpg');
                formData.append('liveness_passed', 'true');

                try {
                    const response = await fetch('/api/mobile/face/enrollment/save/', {
                        method: 'POST',
                        credentials: 'same-origin',
                        body: formData,
                    });
                    const data = await response.json().catch(() => ({}));
                    if (response.status === 401) {
                        window.location.href = '/login/';
                        return;
                    }
                    if (!response.ok || data.ok !== true) {
                        throw new Error(data.error || 'Failed to save face enrollment.');
                    }
                    setStatus('Face enrolled successfully', 'success');
                    stopCamera();
                    window.setTimeout(() => window.location.replace(safeNext()), 700);
                } catch (error) {
                    const message = error.message || 'Failed to save face enrollment.';
                    submitting = false;
                    setStatus(message, 'error');
                    if (!/already registered|contact ELECOM/i.test(message)) {
                        window.setTimeout(resetAutoFlow, 2000);
                    }
                }
            };

            const logout = () => {
                try {
                    sessionStorage.removeItem('elecom_role');
                    sessionStorage.removeItem('elecom_user');
                    sessionStorage.removeItem('elecom_user_photo_url');
                } catch (e) { /* ignore */ }
                stopCamera();
                window.location.href = '/login/';
            };

            logoutBtn.addEventListener('click', logout);
            window.addEventListener('beforeunload', stopCamera);

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus('This browser does not support camera enrollment. Please use a modern browser.', 'error');
                return;
            }

            startCamera();
        });
    </script>
</body>
</html>
