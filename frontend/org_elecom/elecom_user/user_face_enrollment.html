<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Enrollment - ELECOM</title>
    <link rel="icon" type="image/png" href="/static/assets/elecom.png?v=3">
    <link rel="shortcut icon" type="image/png" href="/static/assets/elecom.png?v=3">
    <link rel="apple-touch-icon" href="/static/assets/elecom.png?v=3">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/org_elecom/elecom_user/user_components/user_css/user_dashboard.css?v=20260608-face-backend-detect">
</head>
<body class="theme-elecom face-enrollment-body">
    <main class="face-enroll-shell">
        <section class="face-enroll-panel" aria-labelledby="faceEnrollTitle">
            <div class="face-enroll-top">
                <div class="face-enroll-brand">
                    <img src="/static/assets/elecom.png" alt="ELECOM Logo">
                    <div>
                        <span>Student Account Setup</span>
                        <h1 id="faceEnrollTitle">Register Your Face</h1>
                    </div>
                </div>
                <button type="button" class="btn btn-outline-danger face-enroll-logout" id="faceLogoutBtn">
                    <i class="bi bi-box-arrow-right"></i>
                    Logout
                </button>
            </div>

            <p class="face-enroll-copy">
                Face enrollment is required before opening the student dashboard and voting tools.
            </p>

            <div class="face-camera-card">
                <video id="faceVideo" class="face-camera-video" autoplay playsinline muted></video>
                <canvas id="faceCanvas" class="face-camera-canvas" width="720" height="540" hidden></canvas>
                <canvas id="faceAnalysisCanvas" width="240" height="180" hidden></canvas>
                <canvas id="faceDetectCanvas" width="480" height="360" hidden></canvas>
                <div class="face-guide-overlay" aria-hidden="true">
                    <div class="face-guide-frame" id="faceGuideFrame" data-state="searching">
                        <span class="face-guide-corner face-guide-corner--tl"></span>
                        <span class="face-guide-corner face-guide-corner--tr"></span>
                        <span class="face-guide-corner face-guide-corner--bl"></span>
                        <span class="face-guide-corner face-guide-corner--br"></span>
                        <span class="face-guide-label">Position your face inside the frame</span>
                    </div>
                </div>
                <div class="face-camera-placeholder" id="facePlaceholder">
                    <i class="bi bi-camera-video"></i>
                    <span>Allow camera access to begin enrollment.</span>
                </div>
            </div>

            <div class="face-liveness-steps" aria-label="Face enrollment checks">
                <div class="face-liveness-step" id="faceStepPosition" data-state="active">
                    <i class="bi bi-person-bounding-box"></i>
                    <span>Center face</span>
                </div>
                <div class="face-liveness-step" id="faceStepBlink">
                    <i class="bi bi-eye"></i>
                    <span>Blink once</span>
                </div>
                <div class="face-liveness-step" id="faceStepCapture">
                    <i class="bi bi-camera"></i>
                    <span>Capture</span>
                </div>
            </div>

            <div class="face-enroll-status" id="faceEnrollStatus" role="status">
                Position your face inside the frame, then blink once.
            </div>

        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('faceVideo');
            const canvas = document.getElementById('faceCanvas');
            const analysisCanvas = document.getElementById('faceAnalysisCanvas');
            const detectCanvas = document.getElementById('faceDetectCanvas');
            const placeholder = document.getElementById('facePlaceholder');
            const statusEl = document.getElementById('faceEnrollStatus');
            const logoutBtn = document.getElementById('faceLogoutBtn');
            const guideFrame = document.getElementById('faceGuideFrame');
            const stepPosition = document.getElementById('faceStepPosition');
            const stepBlink = document.getElementById('faceStepBlink');
            const stepCapture = document.getElementById('faceStepCapture');
            const params = new URLSearchParams(window.location.search);
            const next = params.get('next') || '/static/org_elecom/elecom_user/user_dashboard.html';
            let stream = null;
            let capturedBlob = null;
            let detectionTimer = null;
            let faceCentered = false;
            let blinkDetected = false;
            let livenessPassed = false;
            let lastEyePixels = null;
            let stableCenteredFrames = 0;
            let autoCaptureStarted = false;
            let submitting = false;
            let detectorReady = false;
            let lastDetectionAt = 0;
            let lastBackendCheckAt = 0;
            let detectRequestInFlight = false;
            let cachedDetectedBox = null;
            let blinkCandidateFrames = 0;
            let lastCenteredBox = null;

            const setStatus = (message, tone) => {
                statusEl.textContent = message;
                statusEl.dataset.tone = tone || '';
            };

            const safeNext = () => {
                if (next.startsWith('/static/org_elecom/elecom_user/')) return next;
                return '/static/org_elecom/elecom_user/user_dashboard.html';
            };

            const stopCamera = () => {
                if (detectionTimer) {
                    clearInterval(detectionTimer);
                    detectionTimer = null;
                }
                if (!stream) return;
                stream.getTracks().forEach((track) => track.stop());
                stream = null;
            };

            const setStep = (el, state) => {
                if (!el) return;
                el.dataset.state = state || '';
            };

            const updateLivenessUi = () => {
                setStep(stepPosition, faceCentered ? 'done' : 'active');
                setStep(stepBlink, blinkDetected ? 'done' : (faceCentered ? 'active' : ''));
                setStep(stepCapture, livenessPassed ? 'active' : '');
                if (guideFrame) {
                    guideFrame.dataset.state = livenessPassed ? 'done' : (faceCentered ? 'ready' : 'searching');
                }
            };

            const detectWithBrowserApi = async () => {
                if (!detectorReady || !detectCanvas || video.readyState < 2) return null;
                const now = Date.now();
                if (cachedDetectedBox && now - lastBackendCheckAt < 1200) {
                    return cachedDetectedBox;
                }
                if (detectRequestInFlight) {
                    return cachedDetectedBox;
                }
                detectRequestInFlight = true;
                const srcW = video.videoWidth || 720;
                const srcH = video.videoHeight || 540;
                const targetW = 420;
                const targetH = Math.max(1, Math.round(targetW * (srcH / srcW)));
                detectCanvas.width = targetW;
                detectCanvas.height = targetH;
                const ctx = detectCanvas.getContext('2d');
                ctx.drawImage(video, 0, 0, targetW, targetH);
                const blob = await new Promise((resolve) => {
                    detectCanvas.toBlob(resolve, 'image/jpeg', 0.72);
                });
                if (!blob) return null;

                const formData = new FormData();
                formData.append('face_image', blob, 'face-detect.jpg');
                try {
                    const response = await fetch('/api/mobile/face/detect/', {
                        method: 'POST',
                        credentials: 'same-origin',
                        body: formData,
                    });
                    if (response.status === 401) {
                        window.location.href = '/login/';
                        return null;
                    }
                    const data = await response.json().catch(() => ({}));
                    if (!response.ok || data.ok !== true || data.face_detected !== true || !data.rectangle) {
                        cachedDetectedBox = null;
                        lastBackendCheckAt = Date.now();
                        return null;
                    }
                    const rect = data.rectangle;
                    const scaleX = srcW / targetW;
                    const scaleY = srcH / targetH;
                    const box = {
                        x: Math.max(0, Number(rect.left || 0) * scaleX),
                        y: Math.max(0, Number(rect.top || 0) * scaleY),
                        width: Math.max(1, Number(rect.width || 0) * scaleX),
                        height: Math.max(1, Number(rect.height || 0) * scaleY),
                    };
                    cachedDetectedBox = box;
                    lastBackendCheckAt = Date.now();
                    lastDetectionAt = Date.now();
                    return box;
                } catch (e) {
                    setStatus('Face detection connection failed. Checking again...', 'error');
                    cachedDetectedBox = null;
                    lastBackendCheckAt = Date.now();
                    return null;
                } finally {
                    detectRequestInFlight = false;
                }
            };

            const isFaceCentered = (box) => {
                if (!box) return false;
                const w = video.videoWidth || 720;
                const h = video.videoHeight || 540;
                const cx = box.x + box.width / 2;
                const cy = box.y + box.height / 2;
                const frameLeft = w * 0.30;
                const frameRight = w * 0.70;
                const frameTop = h * 0.18;
                const frameBottom = h * 0.78;
                const sizeOk = box.width >= w * 0.24 && box.width <= w * 0.56 && box.height >= h * 0.34 && box.height <= h * 0.72;
                const xOk = cx > frameLeft && cx < frameRight;
                const yOk = cy > frameTop && cy < frameBottom;
                const overlapLeft = Math.max(box.x, frameLeft);
                const overlapTop = Math.max(box.y, frameTop);
                const overlapRight = Math.min(box.x + box.width, frameRight);
                const overlapBottom = Math.min(box.y + box.height, frameBottom);
                const overlapArea = Math.max(0, overlapRight - overlapLeft) * Math.max(0, overlapBottom - overlapTop);
                const faceArea = Math.max(1, box.width * box.height);
                const overlapOk = overlapArea / faceArea >= 0.72;
                return sizeOk && xOk && yOk && overlapOk;
            };

            const sampleEyeBand = (box) => {
                if (!analysisCanvas || !box || video.readyState < 2) return null;
                const srcW = video.videoWidth || 720;
                const srcH = video.videoHeight || 540;
                const scale = Math.min(1, 240 / srcW);
                analysisCanvas.width = Math.max(1, Math.round(srcW * scale));
                analysisCanvas.height = Math.max(1, Math.round(srcH * scale));
                const ctx = analysisCanvas.getContext('2d');
                ctx.drawImage(video, 0, 0, analysisCanvas.width, analysisCanvas.height);

                const ex = Math.max(0, Math.round((box.x + box.width * 0.18) * scale));
                const ey = Math.max(0, Math.round((box.y + box.height * 0.24) * scale));
                const ew = Math.max(8, Math.round(box.width * 0.64 * scale));
                const eh = Math.max(6, Math.round(box.height * 0.16 * scale));
                const safeW = Math.min(ew, analysisCanvas.width - ex);
                const safeH = Math.min(eh, analysisCanvas.height - ey);
                if (safeW <= 0 || safeH <= 0) return null;
                return ctx.getImageData(ex, ey, safeW, safeH).data;
            };

            const averagePixelDiff = (a, b) => {
                if (!a || !b || a.length !== b.length) return 0;
                let total = 0;
                let count = 0;
                for (let i = 0; i < a.length; i += 4) {
                    const ag = (a[i] + a[i + 1] + a[i + 2]) / 3;
                    const bg = (b[i] + b[i + 1] + b[i + 2]) / 3;
                    total += Math.abs(ag - bg);
                    count += 1;
                }
                return count ? total / count : 0;
            };

            const faceBoxMotion = (a, b) => {
                if (!a || !b) return 1;
                const w = video.videoWidth || 720;
                const h = video.videoHeight || 540;
                const acx = a.x + a.width / 2;
                const acy = a.y + a.height / 2;
                const bcx = b.x + b.width / 2;
                const bcy = b.y + b.height / 2;
                const centerMove = Math.hypot((acx - bcx) / w, (acy - bcy) / h);
                const sizeMove = Math.abs(a.width - b.width) / w + Math.abs(a.height - b.height) / h;
                return centerMove + sizeMove;
            };

            const analyzeFace = async () => {
                if (!stream || video.hidden || capturedBlob || autoCaptureStarted || submitting) return;
                const detectedBox = await detectWithBrowserApi();
                if (!detectorReady) {
                    setStatus('Face detection is starting. Keep your face inside the frame.');
                    updateLivenessUi();
                    return;
                }
                if (!detectedBox) {
                    stableCenteredFrames = 0;
                    faceCentered = false;
                    blinkDetected = false;
                    blinkCandidateFrames = 0;
                    lastCenteredBox = null;
                    lastEyePixels = null;
                    const status = lastDetectionAt
                        ? 'Face lost. Move closer and keep your full face inside the frame.'
                        : 'Looking for your face. Move closer and face the camera.';
                    setStatus(status);
                    updateLivenessUi();
                    return;
                }
                const box = detectedBox;
                const centeredNow = isFaceCentered(box);
                stableCenteredFrames = centeredNow ? Math.min(stableCenteredFrames + 1, 12) : 0;
                faceCentered = stableCenteredFrames >= 5;

                if (!faceCentered) {
                    lastEyePixels = null;
                    blinkCandidateFrames = 0;
                    lastCenteredBox = null;
                    setStatus('Position your face inside the frame.');
                    updateLivenessUi();
                    return;
                }

                const motion = faceBoxMotion(lastCenteredBox, box);
                lastCenteredBox = { x: box.x, y: box.y, width: box.width, height: box.height };
                if (motion > 0.035) {
                    lastEyePixels = null;
                    blinkCandidateFrames = 0;
                    setStatus('Hold still inside the frame, then blink once.');
                    updateLivenessUi();
                    return;
                }

                const eyePixels = sampleEyeBand(box);
                const diff = averagePixelDiff(lastEyePixels, eyePixels);
                blinkCandidateFrames = lastEyePixels && diff > 22 && diff < 58 ? blinkCandidateFrames + 1 : 0;
                if (blinkCandidateFrames >= 2) {
                    blinkDetected = true;
                    livenessPassed = true;
                }
                lastEyePixels = eyePixels;

                if (livenessPassed) {
                    setStatus('Blink detected. Capturing your enrollment photo...', 'success');
                    if (!autoCaptureStarted) {
                        autoCaptureStarted = true;
                        window.setTimeout(captureFace, 350);
                    }
                } else {
                    setStatus('Face centered. Blink once to continue.');
                }
                updateLivenessUi();
            };

            const startCamera = async () => {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 540 } },
                        audio: false,
                    });
                    video.srcObject = stream;
                    placeholder.hidden = true;
                    detectorReady = true;
                    setStatus('Position your face inside the frame.');
                    updateLivenessUi();
                    detectionTimer = setInterval(analyzeFace, 260);
                } catch (error) {
                    setStatus('Camera access is required. Allow camera permission, then reload this page.', 'error');
                    placeholder.hidden = false;
                }
            };

            const captureFace = () => {
                if (!livenessPassed || submitting) {
                    setStatus('Please center your face and blink once before capturing.', 'error');
                    autoCaptureStarted = false;
                    return;
                }
                const width = video.videoWidth || 720;
                const height = video.videoHeight || 540;
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, width, height);
                canvas.toBlob((blob) => {
                    if (!blob) {
                        setStatus('Could not capture image. Please try again.', 'error');
                        return;
                    }
                    capturedBlob = blob;
                    canvas.hidden = false;
                    video.hidden = true;
                    setStatus('Captured. Saving your face enrollment...', 'success');
                    submitFace();
                }, 'image/jpeg', 0.92);
            };

            const resetAutoFlow = () => {
                capturedBlob = null;
                faceCentered = false;
                blinkDetected = false;
                livenessPassed = false;
                lastEyePixels = null;
                stableCenteredFrames = 0;
                autoCaptureStarted = false;
                blinkCandidateFrames = 0;
                lastCenteredBox = null;
                cachedDetectedBox = null;
                lastBackendCheckAt = 0;
                canvas.hidden = true;
                video.hidden = false;
                setStatus('Position your face inside the frame.');
                updateLivenessUi();
            };

            const submitFace = async () => {
                if (!capturedBlob || submitting) return;
                submitting = true;
                setStatus('Saving your face enrollment...');

                const formData = new FormData();
                formData.append('face_image', capturedBlob, 'face-enrollment.jpg');

                try {
                    const response = await fetch('/api/mobile/face/enrollment/save/', {
                        method: 'POST',
                        credentials: 'same-origin',
                        body: formData,
                    });
                    const data = await response.json().catch(() => ({}));
                    if (response.status === 401) {
                        window.location.href = '/login/';
                        return;
                    }
                    if (!response.ok || data.ok !== true) {
                        throw new Error(data.error || 'Failed to save face enrollment.');
                    }
                    setStatus('Face enrollment complete. Opening your student dashboard...', 'success');
                    stopCamera();
                    window.location.replace(safeNext());
                } catch (error) {
                    const message = error.message || 'Failed to save face enrollment.';
                    submitting = false;
                    setStatus(message, 'error');
                    if (!/already registered|contact ELECOM/i.test(message)) {
                        window.setTimeout(resetAutoFlow, 2000);
                    }
                }
            };

            const logout = () => {
                try {
                    sessionStorage.removeItem('elecom_role');
                    sessionStorage.removeItem('elecom_user');
                    sessionStorage.removeItem('elecom_user_photo_url');
                } catch (e) { /* ignore */ }
                stopCamera();
                window.location.href = '/login/';
            };

            logoutBtn.addEventListener('click', logout);
            window.addEventListener('beforeunload', stopCamera);

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus('This browser does not support camera enrollment. Please use a modern browser.', 'error');
                return;
            }

            startCamera();
        });
    </script>
</body>
</html>
