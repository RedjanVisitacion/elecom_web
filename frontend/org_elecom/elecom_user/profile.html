<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ELECOM</title>
    <link rel="icon" href="/static/assets/elecom.png" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/org_elecom/elecom_admin/admin_components/admin_css/admin_dashboard.css?v=20260313">
    <link rel="stylesheet" href="/static/org_elecom/elecom_user/user_components/user_css/user_dashboard.css">
</head>
<body class="theme-elecom">

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-content">
                <div class="logo-container">
                    <img src="/static/assets/elecom.png" alt="ELECOM Logo" onerror="this.onerror=null;this.src='/static/assets/elecom.png';">
                    <img class="wordmark" src="/static/assets/img_text/elecom_white1.png" alt="Electoral Commission">
                </div>
                <button class="btn-close-sidebar" id="closeSidebar"><i class="bi bi-x-lg"></i></button>
            </div>
        </div>
        <div class="sidebar-menu">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="/static/org_elecom/elecom_user/user_dashboard.html">
                        <i class="bi bi-house-door"></i>
                        <span>Home</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/static/org_elecom/elecom_user/user_election.html">
                        <i class="bi bi-box-arrow-in-down"></i>
                        <span>Election</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-file-bar-graph"></i>
                        <span>Results</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/static/org_elecom/elecom_user/user_receipt.html">
                        <i class="bi bi-check2"></i>
                        <span>Voting Receipt</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <nav class="top-navbar">
            <button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>

            <div class="system-status-badge is-high" id="systemStatusBadge" title="Network status">
                <span class="status-dot" aria-hidden="true"></span>
                <span class="status-text" id="systemStatusText">Network High</span>
            </div>

            <div class="user-info position-relative" id="userMenu" style="margin-left:auto;">
                <button type="button" class="notif-bell" id="notifBell" aria-label="Notifications">
                    <i class="bi bi-bell"></i>
                    <span class="notif-count" id="notifCount" aria-label="0 unread notifications">0</span>
                </button>
                <button type="button" class="btn p-0 border-0 bg-transparent d-flex align-items-center gap-2" id="userMenuToggle" aria-label="Profile menu" aria-expanded="false">
                    <div class="user-avatar user-avatar--nav">
                        <img id="userAvatarImg" src="" alt="" style="display:none; width:40px; height:40px; border-radius:50%; object-fit:cover;">
                        <i class="bi bi-person-circle" id="userAvatarIcon"></i>
                    </div>
                </button>

                <div class="user-dropdown card shadow-sm border-0" id="userMenuDropdown">
                    <div class="card-body p-3">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <div class="user-avatar user-avatar-sm">
                                <img id="menuAvatarImg" src="" alt="" style="display:none; width:34px; height:34px; border-radius:50%; object-fit:cover;">
                                <i class="bi bi-person-circle" id="menuAvatarIcon"></i>
                            </div>
                            <div>
                                <div class="fw-semibold" id="menuName">Student</div>
                                <div class="small text-muted" id="menuRole">student</div>
                            </div>
                        </div>
                        <hr class="my-2">
                        <a class="dropdown-item d-flex align-items-center gap-2" href="/static/org_elecom/elecom_user/profile.html" id="profileLink">
                            <i class="bi bi-person"></i>
                            <span>Profile</span>
                        </a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item dropdown-item-logout d-flex align-items-center gap-2" href="#" id="userMenuLogoutLink">
                            <i class="bi bi-box-arrow-right"></i>
                            <span>Logout</span>
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="content-area">
            <div class="profile-fb-header mb-3">
                <div class="profile-fb-cover">
                    <div class="profile-cover-menu" id="profileCoverMenu">
                        <button type="button" class="profile-cover-menu-btn" id="profileCoverMenuBtn" aria-label="Profile menu">
                            <i class="bi bi-three-dots-vertical" aria-hidden="true"></i>
                        </button>
                        <div class="profile-cover-menu-dropdown card shadow-sm border-0" id="profileCoverMenuDropdown" style="display:none;">
                            <div class="card-body p-2">
                                <a href="#" class="dropdown-item" id="profileCoverChangePassword">Change Password</a>
                                <a href="#" class="dropdown-item" id="profileCoverEditInfo">Edit Information</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="profile-fb-body">
                    <div class="profile-fb-identity">
                        <div class="profile-fb-avatar">
                            <img id="profileAvatarImg" src="" alt="" style="display:none;">
                            <i id="profileAvatarIcon" class="bi bi-person-circle" style="font-size:72px; color:#6b7280;"></i>
                        </div>

                        <div class="profile-fb-title">
                            <div class="fw-semibold fs-4" id="profileHeaderName">Profile</div>
                            <div class="text-muted" id="profileSubtitle">Account information</div>
                        </div>
                    </div>

                    <div class="profile-fb-actions">
                        <input id="profilePhotoFile" type="file" accept="image/*" style="display:none;">
                        <button type="button" class="btn btn-light border" id="btnChangeProfilePhoto">
                            <i class="bi bi-camera me-2"></i>Change photo
                        </button>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="alert alert-success" id="profileSuccess" style="display:none;"></div>
                    <div class="alert alert-danger" id="profileError" style="display:none;"></div>

                    <div class="row g-3" id="profileGrid" style="display:none;">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_full_name" readonly>
                                <label for="pf_full_name">Full Name</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_student_id" readonly>
                                <label for="pf_student_id">Student ID</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_course" readonly>
                                <label for="pf_course">Course</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_year_section" readonly>
                                <label for="pf_year_section">Year &amp; Section</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_email" readonly>
                                <label for="pf_email">Email</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_phone" readonly>
                                <label for="pf_phone">Phone</label>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="pf_created_at" readonly>
                                <label for="pf_created_at">Created At</label>
                            </div>
                        </div>
                    </div>

                    <div class="text-muted" id="profileLoading">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Change Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-danger" id="changePasswordError" style="display:none;"></div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="cp_old_password" placeholder="Old Password">
                        <label for="cp_old_password">Old Password</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="cp_new_password" placeholder="New Password">
                        <label for="cp_new_password">New Password</label>
                    </div>

                    <div class="form-floating">
                        <input type="password" class="form-control" id="cp_confirm_password" placeholder="Confirm Password">
                        <label for="cp_confirm_password">Confirm Password</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btnSaveChangePassword">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editInfoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Information</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-danger" id="editInfoError" style="display:none;"></div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="edit_email" placeholder="Email">
                        <label for="edit_email">Email</label>
                    </div>

                    <div class="form-floating">
                        <input type="text" class="form-control" id="edit_phone" placeholder="Phone">
                        <label for="edit_phone">Phone</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btnSaveEditInfo">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="/static/org_elecom/elecom_user/user_components/user_js/user_dashboard.js"></script>
    <script src="/static/org_elecom/elecom_user/user_components/user_js/profile.js"></script>
</body>
</html>
