{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ELECOM | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="{% static 'assets/elecom.png' %}"/>
    
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
   
    <link rel="stylesheet" href="{% static 'org_elecom/elecom_components/elecom_css/elecom_login.css' %}" />
  
    <link rel="stylesheet" href="./elecom_components/elecom_css/elecom_login.css" />
  </head>
  <body>
    <main class="page">
      <section class="wrap" aria-label="ELECOM login">
        <aside class="hero">
          <div class="hero__grid">
            <div class="hero__content">
              <div class="brand">
                <div class="logo" aria-hidden="true">
                  <img src="{% static '/assets/elecom.png'%}" alt="ELECOM Logo" />
                </div>
                <div>
                  <div class="wordmark" aria-label="ELECOM">
                    <img src="{% static '/assets/img_text/elecom_black1.png' %}" alt="ELECOM" />
                  </div>
                  <p>USTP-OROQUIETA Campus, Electoral Voting System</p>
                </div>
              </div>

              <div class="hero__art" aria-hidden="true"></div>

              <h2>Explore the things you vote for.</h2>
            </div>
          </div>
        </aside>

        <section class="card">
          <div class="mobile-brand" aria-label="ELECOM">
            <img class="mobile-brand__logo" src="../assets/elecom.png" alt="ELECOM Logo" />
            <img class="mobile-brand__wordmark" src="../assets/img_text/elecom_black1.png" alt="ELECOM" />
          </div>
          <h3>Log in</h3>

          <form id="loginForm" novalidate autocomplete="off">
            <div>
              
              <input class="input" id="studentId" name="studentId" type="text" placeholder="Enter your student ID" required autocomplete="off" autocapitalize="off" spellcheck="false" />
              <p class="error" id="studentIdError" role="alert" aria-live="polite"></p>
            </div>

            <div>
              
              <div class="input-wrap">
                <input class="input" id="password" name="password" type="password" placeholder="Enter your password" required minlength="6" autocomplete="new-password" />
                <button class="ghost" type="button" id="togglePassword" aria-label="Show password">
                  <i class="bi bi-eye" aria-hidden="true"></i>
                </button>
              </div>
              <p class="error" id="passwordError" role="alert" aria-live="polite"></p>
            </div>

            <button class="btn" id="submitBtn" type="submit">Sign in</button>
            <p class="status" id="formStatus" role="status" aria-live="polite"></p>

            <a class="link" href="#" id="forgotPassword">Forgot password?</a>

            <div class="divider" role="separator" aria-hidden="true"></div>

          </form>

          <div class="foot">© <span id="year"></span> rpsv_codes</div>
        </section>
      </section>
    </main>
    <script src="./elecom_components/elecom_js/elecom_login.js"></script>
  </body>
</html>
